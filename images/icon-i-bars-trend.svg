<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- I: Charts-and-metrics combo - gradient token bars with the cyan cost
       trail flying over them, ending on the current request. Frameless. -->
  <defs>
    <linearGradient id="gi" gradientUnits="userSpaceOnUse" x1="0" y1="128" x2="128" y2="0">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <g stroke="url(#gi)" stroke-width="17" stroke-linecap="round">
    <line x1="24" y1="110" x2="24" y2="76"/>
    <line x1="58" y1="110" x2="58" y2="58"/>
    <line x1="92" y1="110" x2="92" y2="82"/>
  </g>
  <polyline points="16,62 58,38 92,50 112,22" fill="none" stroke="#22D3EE" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="112" cy="22" r="11" fill="#22D3EE"/>
</svg>
