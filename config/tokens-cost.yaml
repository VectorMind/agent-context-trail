# Cost estimation config for Agent Context Trail.
#
# Used only when the provider log/response does not report cost directly.
# Rates are per-million-tokens (MTok), in USD, taken verbatim from the
# official pricing page for each vendor. Re-check the "retrieved" date
# periodically and update by hand when pricing changes — this file is
# deliberately not auto-synced.
schemaVersion: 1

claude:
  source: https://platform.claude.com/docs/en/about-claude/pricing
  retrieved: "2026-07-04"
  # cacheWrite5m / cacheWrite1h / cacheRead are prompt-caching write and hit
  # rates. Anthropic documents these as fixed multipliers of baseInput
  # (1.25x / 2x / 0.1x) but this file keeps the resolved absolute numbers so
  # a rate change is a one-line diff instead of a recomputation.
  models:
    claude-fable-5:
      baseInput: 10.00
      cacheWrite5m: 12.50
      cacheWrite1h: 20.00
      cacheRead: 1.00
      output: 50.00
    claude-mythos-5:
      baseInput: 10.00
      cacheWrite5m: 12.50
      cacheWrite1h: 20.00
      cacheRead: 1.00
      output: 50.00
    claude-opus-4-8:
      baseInput: 5.00
      cacheWrite5m: 6.25
      cacheWrite1h: 10.00
      cacheRead: 0.50
      output: 25.00
    claude-opus-4-7:
      baseInput: 5.00
      cacheWrite5m: 6.25
      cacheWrite1h: 10.00
      cacheRead: 0.50
      output: 25.00
    claude-opus-4-6:
      baseInput: 5.00
      cacheWrite5m: 6.25
      cacheWrite1h: 10.00
      cacheRead: 0.50
      output: 25.00
    claude-opus-4-5:
      baseInput: 5.00
      cacheWrite5m: 6.25
      cacheWrite1h: 10.00
      cacheRead: 0.50
      output: 25.00
    claude-sonnet-5:
      # Introductory pricing, in effect through 2026-08-31. Standard pricing
      # ($3 / $3.75 / $6 / $0.30 / $15) takes effect 2026-09-01 — update this
      # block on that date.
      baseInput: 2.00
      cacheWrite5m: 2.50
      cacheWrite1h: 4.00
      cacheRead: 0.20
      output: 10.00
    claude-sonnet-4-6:
      baseInput: 3.00
      cacheWrite5m: 3.75
      cacheWrite1h: 6.00
      cacheRead: 0.30
      output: 15.00
    claude-sonnet-4-5:
      baseInput: 3.00
      cacheWrite5m: 3.75
      cacheWrite1h: 6.00
      cacheRead: 0.30
      output: 15.00
    claude-haiku-4-5:
      baseInput: 1.00
      cacheWrite5m: 1.25
      cacheWrite1h: 2.00
      cacheRead: 0.10
      output: 5.00
  # Used when message.model isn't found above (new/renamed model). Current
  # generation Sonnet rates are the safest general-purpose default.
  fallback:
    baseInput: 3.00
    cacheWrite5m: 3.75
    cacheWrite1h: 6.00
    cacheRead: 0.30
    output: 15.00

# Codex has no per-token cache-write tier (no cacheCreationTokens in its local
# logs), so its rate shape drops cacheWrite5m/cacheWrite1h entirely. These are
# the vendor's standard metered API list rates, applied to Codex's local token
# counts as a bring-your-own-token equivalent even though Codex itself is
# usually billed through a subscription/rate-limit plan, not per token.
codex:
  source: https://developers.openai.com/api/docs/pricing
  retrieved: "2026-07-05"
  models:
    gpt-5.3-codex:
      baseInput: 1.75
      cacheRead: 0.175
      output: 14.00
    gpt-5.4:
      baseInput: 2.50
      cacheRead: 0.25
      output: 15.00
    gpt-5.4-mini:
      baseInput: 0.75
      cacheRead: 0.075
      output: 4.50
    gpt-5.4-nano:
      baseInput: 0.20
      cacheRead: 0.02
      output: 1.25
    gpt-5.4-pro:
      # Pro tier publishes no discounted cached-input rate; treat cache reads
      # as full-price input rather than inventing a discount.
      baseInput: 30.00
      cacheRead: 30.00
      output: 180.00
    gpt-5.5:
      baseInput: 5.00
      cacheRead: 0.50
      output: 30.00
    gpt-5.5-pro:
      baseInput: 30.00
      cacheRead: 30.00
      output: 180.00
  # Used when turn_context.model isn't found above (new/renamed model).
  # gpt-5.4 is the current mid-tier default Codex CLI model.
  fallback:
    baseInput: 2.50
    cacheRead: 0.25
    output: 15.00

# Copilot reports real per-request input/output tokens
# (chatSessions.jsonl's promptTokens/completionTokens) and a resolved model
# name, but never a cost figure - same bring-your-own-token situation as
# Codex. Copilot's `resolvedModel` naming does not match the vendor APIs'
# own model ids (e.g. "gpt-5-mini" here vs Codex's "gpt-5.4-mini"), and
# Copilot can also resolve to internal, non-public routing codenames (e.g.
# "oswe-vscode-prime", observed on real local data) that have no published
# rate at all. Rather than leave those `unavailable` - which the project's
# BYOT rule reserves for "no rate table entry exists," not "unrecognized
# model name" - every resolved model not listed below falls back to a
# generic current-generation mid-tier rate.
copilot:
  source: https://developers.openai.com/api/docs/pricing
  retrieved: "2026-07-06"
  models: {}
  # No confirmed per-model Copilot rate entries yet (see comment above) -
  # every resolved model uses this fallback until specific entries are
  # verified against a cited, dated source. Same absolute numbers as
  # codex.fallback (current-generation OpenAI mid-tier), since Copilot's
  # own local data has so far resolved to OpenAI-family models on this
  # account.
  fallback:
    baseInput: 2.50
    cacheRead: 0.25
    output: 15.00
